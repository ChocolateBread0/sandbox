<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Albero di Natale (JS Edition)</title>
    <style>
        body { 
            /* Gradiente Cyberpunk: dal nero profondo a un viola "notturno" */
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
            background-attachment: fixed; 
            color: #00ffcc; /* Ciano Neon per i testi */
            font-family: 'Courier New', Courier, monospace; /* Font più "terminale" */
            margin: 0;
            overflow-x: hidden;
        }
        #tree-container { 
            white-space: pre-wrap; 
            font-family: monospace; 
            align: center;
        }
        p {margin: 0; padding: 0; line-height: 0.7; }
        .luce 
        {
            transition: color 0.4s ease-in-out; /* Cambia colore in 0.8 secondi */
            display: inline-block; 
        }
    </style>
</head>
<body>
    <h1>Albero di Natale con luci!</h1>
    <div id="tree-container"></div>
    <script src="script/utils.js"></script>
    <script src="script/Lights.js"></script>
    <script src="script/albero.js"></script>    
</body>
</html>
